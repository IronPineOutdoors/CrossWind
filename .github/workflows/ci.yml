name: CI Compile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - fqbn: arduino:avr:uno
            sketch: crosswind
            core: arduino:avr
          - fqbn: esp32:esp32:esp32
            sketch: crosswind_esp32
            core: esp32:esp32
    steps:
      - uses: actions/checkout@v4

      - name: Cache Arduino cores
        uses: actions/cache@v4
        with:
          path: ~/.arduino15/packages
          key: ${{ runner.os }}-arduino-cores-${{ matrix.target.core }}
          restore-keys: |
            ${{ runner.os }}-arduino-cores-

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/arduino-cli
          arduino-cli version

      - name: Update and install board core
        run: |
          arduino-cli core update-index
          arduino-cli core install ${{ matrix.target.core }}

      - name: Compile firmware
        run: arduino-cli compile --fqbn ${{ matrix.target.fqbn }} ${{ matrix.target.sketch }}
