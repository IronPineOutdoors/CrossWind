name: CI Compile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/arduino-cli
          arduino-cli version

      - name: Update cores
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile AVR sketch (crosswind)
        run: arduino-cli compile --fqbn arduino:avr:uno crosswind

      - name: Install ESP32 core (best-effort)
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32 || true

      - name: Compile ESP32 sketch (best-effort, may require board package)
        continue-on-error: true
        run: arduino-cli compile --fqbn esp32:esp32:esp32 crosswind_esp32 || true
