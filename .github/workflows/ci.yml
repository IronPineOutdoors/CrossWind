name: CI Compile

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: Arduino AVR
            fqbn: arduino:avr:uno
            sketch: firmware/crosswind-arduino/Crosswind_Controller
            core: arduino:avr
    steps:
      - uses: actions/checkout@v4

      - name: Cache Arduino cores
        uses: actions/cache@v4
        with:
          path: ~/.arduino15/packages
          key: ${{ runner.os }}-arduino-cores-${{ matrix.core }}
          restore-keys: |
            ${{ runner.os }}-arduino-cores-

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/arduino-cli
          arduino-cli version

      - name: Update and install board core
        run: |
          arduino-cli core update-index
          arduino-cli core install ${{ matrix.core }}

      - name: Compile firmware
        run: arduino-cli compile --fqbn ${{ matrix.fqbn }} ${{ matrix.sketch }}

  platformio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PlatformIO
        run: pipx install platformio

      - name: Compile ESP32 firmware
        working-directory: firmware/crosswind-esp32
        run: pio run
