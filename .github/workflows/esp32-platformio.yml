name: ESP32 PlatformIO

on:
  push:
    paths:
      - "firmware/crosswind-esp32/**"
      - ".github/workflows/esp32-platformio.yml"
  pull_request:
    paths:
      - "firmware/crosswind-esp32/**"
      - ".github/workflows/esp32-platformio.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build Crosswind ESP32 firmware
        working-directory: firmware/crosswind-esp32
        run: pio run
